name = "up2cloud-website"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

# ── KV Namespace Bindings ─────────────────────────────────────────────────────
# Production bindings are configured in Cloudflare Pages dashboard:
#   Pages → up2cloud-tech → Settings → Functions → KV namespace bindings
#
# For local dev with wrangler pages dev, replace the IDs below with real values
# from: Workers & Pages → KV → copy the namespace ID.
# Then run: wrangler pages dev .
#
# Binding name must match exactly: env.UP2CLOUD_COMMENTS and env.UP2CLOUD_LIKES

[[kv_namespaces]]
binding    = "UP2CLOUD_COMMENTS"
id         = "b35d7c8254a54f70a93eda024b8c329b"
preview_id = "b35d7c8254a54f70a93eda024b8c329b"

[[kv_namespaces]]
binding    = "UP2CLOUD_LIKES"
id         = "c5829fe6099e4e628218add47ffed102"
preview_id = "c5829fe6099e4e628218add47ffed102"

# ── Local dev env vars ────────────────────────────────────────────────────────
# Copy to .dev.vars (gitignored) and fill in real values for local testing:
#   BREVO_API_KEY=your_key_here
#   BREVO_LIST_ID=3
#   GROQ_API_KEY=your_key_here
